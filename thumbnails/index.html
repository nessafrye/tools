/* ── Base ───────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  font-family: 'Aeonik VF', 'Aeonik', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ── App shell ──────────────────────────────────────────────────────────── */
.app {
  display: flex;
  flex: 1;
  min-height: 100vh;
}

/* ────────────────────────────────────────────────────────────────────────
   SIDEBAR
──────────────────────────────────────────────────────────────────────── */
.sidebar {
  width: 300px;
  flex-shrink: 0;
  background: var(--panel-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  padding: 28px 24px 24px;
  gap: 0;
}

/* Header */
.sidebar-header {
  display: flex;
  align-items: center;
  gap: 12px;
  padding-bottom: 24px;
}
.btn-back {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn-back:hover {
  background: rgba(255,255,255,0.06);
  border-color: var(--border-hover);
  color: var(--text-primary);
}
.btn-back svg { width: 14px; height: 14px; }
.sidebar-title {
  font-size: 18px;
  font-weight: 600;
  color: var(--text-primary);
  line-height: 1.2;
  letter-spacing: -0.01em;
}

/* Brand dropdown */
.select-wrapper {
  position: relative;
}
.brand-select {
  font-family: 'Aeonik VF', 'Aeonik', system-ui, sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: var(--text-primary);
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px 40px 10px 14px;
  width: 100%;
  outline: none;
  cursor: pointer;
  appearance: none;
  -webkit-appearance: none;
  transition: border-color 0.15s, background 0.15s;
}
.brand-select:hover {
  border-color: var(--border-hover);
  background: rgba(255,255,255,0.09);
}
.brand-select:focus {
  border-color: var(--border-hover);
}
.select-arrow {
  pointer-events: none;
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-secondary);
  display: flex;
  align-items: center;
}
.select-arrow svg { width: 12px; height: 12px; }

.sidebar-divider {
  height: 1px;
  background: var(--border);
  margin: 0 -24px;
}

/* Field sections */
.sidebar-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  gap: 24px;
  padding-top: 24px;
}

.field-block {
  display: flex;
  flex-direction: column;
  gap: 0;
}

.field-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 10px;
}

/* Textarea */
.field-block textarea {
  font-family: 'Aeonik VF', 'Aeonik', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.55;
  color: var(--text-primary);
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  resize: none;
  width: 100%;
  min-height: 120px;
  outline: none;
  transition: border-color 0.15s, background 0.15s;
  caret-color: var(--accent);
}
.field-block textarea:focus {
  border-color: var(--border-hover);
  background: rgba(255,255,255,0.09);
}

/* Mono helper text */
.field-hint {
  font-family: 'Aeonik Mono', 'Courier New', monospace;
  font-size: 11.5px;
  color: var(--text-secondary);
  margin-top: 10px;
  letter-spacing: 0.01em;
}

/* Font size row */
.fontsize-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.fontsize-label {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-primary);
}
.fontsize-pill {
  font-family: 'Aeonik Mono', 'Courier New', monospace;
  font-size: 12px;
  font-weight: 500;
  background: rgba(255,255,255,0.08);
  color: var(--text-primary);
  border: 1px solid var(--border);
  border-radius: 99px;
  padding: 4px 12px;
  transition: background 0.2s, color 0.2s, border-color 0.2s;
}
.fontsize-pill.shrunk {
  background: rgba(255,152,46,0.12);
  color: var(--carrot-3);
  border-color: rgba(255,152,46,0.30);
}

/* Sidebar footer */
.sidebar-footer {
  padding-top: 20px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.btn-reset {
  font-family: 'Aeonik VF', 'Aeonik', system-ui, sans-serif;
  font-size: 13.5px;
  font-weight: 500;
  width: 100%;
  padding: 11px 20px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  transition: background 0.15s, border-color 0.15s, color 0.15s;
}
.btn-reset:hover {
  background: rgba(255,255,255,0.06);
  border-color: var(--border-hover);
  color: var(--text-primary);
}

/* ────────────────────────────────────────────────────────────────────────
   MAIN / PREVIEW
──────────────────────────────────────────────────────────────────────── */
.main {
  flex: 1;
  display: flex;
  flex-direction: column;
  background-color: #F8F8F8;
  background-image: radial-gradient(circle, rgba(0,0,0,0.045) 1px, transparent 1px);
  background-size: 10px 10px;
  overflow: hidden;
}

/* Tabs */
.tab-bar {
  display: flex;
  border-bottom: 1px solid rgba(0,0,0,0.10);
  padding: 0 48px;
  flex-shrink: 0;
  background: #F8F8F8; /* flat strip so dots don't distract below tabs */
}
.tab-btn {
  font-family: 'Aeonik VF', 'Aeonik', system-ui, sans-serif;
  font-size: 14px;
  font-weight: 500;
  color: rgba(0,0,0,0.38);
  background: none;
  border: none;
  border-bottom: 2px solid transparent;
  padding: 14px 4px;
  margin-right: 24px;
  margin-bottom: -1px;
  cursor: pointer;
  transition: color 0.15s, border-color 0.15s;
  letter-spacing: 0.01em;
}
.tab-btn.active {
  color: rgba(0,0,0,0.85);
  border-bottom-color: rgba(0,0,0,0.85);
}
.tab-btn:hover:not(.active) {
  color: rgba(0,0,0,0.65);
}

/* Blog placeholder */
.blog-placeholder {
  display: none;
  width: 100%;
  max-width: 880px;
}
.blog-placeholder-frame {
  width: 100%;
  aspect-ratio: 1600 / 697;
  background: #1a1a1a;
  border-radius: 14px;
  display: flex;
  align-items: center;
  justify-content: center;
  border: 1.5px dashed rgba(0,0,0,0.15);
}
.blog-placeholder-label {
  font-family: 'Aeonik VF', 'Aeonik', system-ui, sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: rgba(255,255,255,0.25);
  letter-spacing: 0.04em;
  text-transform: uppercase;
}

/* Main content area */
.main-content {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 48px;
}
.preview-outer {
  width: 100%;
  max-width: 880px;
}
.preview-eyebrow {
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.38);
  margin-bottom: 14px;
}
.preview-frame {
  width: 100%;
  aspect-ratio: 1600 / 697;
  border: 1.5px dashed rgba(0,0,0,0.15);
  border-radius: 14px;
  overflow: hidden;
  background: transparent;
  transition: border-color 0.2s;
}
.preview-frame:hover {
  border-color: rgba(0,0,0,0.28);
}
.preview-frame svg {
  display: block;
  width: 100%;
  height: 100%;
  border-radius: 12px;
}
.preview-meta {
  font-family: 'Aeonik VF', 'Aeonik', system-ui, sans-serif;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: rgba(0,0,0,0.38);
  margin-top: 12px;
}

/* ────────────────────────────────────────────────────────────────────────
   DOWNLOAD BUTTON (in sidebar footer)
──────────────────────────────────────────────────────────────────────── */
.btn-download-fixed {
  font-family: 'Aeonik VF', 'Aeonik', system-ui, sans-serif;
  font-size: 14px;
  font-weight: 600;
  width: 100%;
  padding: 13px 20px;
  border-radius: 12px;
  border: none;
  background: var(--accent);
  color: #000;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  transition: background 0.15s, transform 0.1s;
  letter-spacing: 0.01em;
}
.btn-download-fixed:hover {
  background: var(--accent-dark);
  transform: translateY(-1px);
}
.btn-download-fixed:active {
  transform: translateY(0);
}
.btn-download-fixed:disabled {
  opacity: 0.50;
  cursor: not-allowed;
  transform: none;
}
.btn-download-fixed .dl-arrow {
  width: 22px;
  height: 22px;
  background: rgba(0,0,0,0.15);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}
.btn-download-fixed .dl-arrow svg {
  width: 12px;
  height: 12px;
}
</style>
</head>

  /* ── DOM refs ───────────────────────────────────────────────────────── */
  var svgEl         = document.getElementById('thumbnail-svg');
  var svgFormstack  = document.getElementById('thumbnail-svg-formstack');
  var textEl        = document.getElementById('data-editable');
  var textElFs      = document.getElementById('data-editable-formstack');
  var textarea      = document.getElementById('title-input');
  var resetBtn      = document.getElementById('reset-btn');
  var downloadBtn   = document.getElementById('download-btn');
  var downloadLabel = document.getElementById('download-label');
  var sizePill      = document.getElementById('size-pill');
  var brandSelect   = document.getElementById('brand-select');
  var tabProductboard = document.getElementById('tab-productboard');
  var tabBlog         = document.getElementById('tab-blog');

  /* ── Measurement canvas ─────────────────────────────────────────────── */
  var mCanvas = document.createElement('canvas');
  var mCtx    = mCanvas.getContext('2d');

  function measureLine(text, size) {
    var fontFamily = (currentBrand === 'formstack') ? 'Sofia Pro' : 'Aeonik';
    mCtx.font = size + 'px ' + fontFamily;
    return mCtx.measureText(text).width;
  }

  function calcFontSize(lines) {
    var size = DEFAULT_SIZE;
    while (size > MIN_SIZE) {
      var maxW = 0;
      for (var i = 0; i < lines.length; i++) {
        var w = measureLine(lines[i], size);
        if (w > maxW) maxW = w;
      }
      if (maxW <= MAX_WIDTH) break;
      size -= 2;
    }
    return Math.max(size, MIN_SIZE);
  }

  /* ── SVG updater ────────────────────────────────────────────────────── */
  function updateTextEl(el, lines, size) {
    el.setAttribute('font-size', size);
    if (el === textElFs) {
      el.setAttribute('font-family', 'Sofia Pro');
    } else {
      el.setAttribute('font-family', 'Aeonik');
    }
    while (el.firstChild) { el.removeChild(el.firstChild); }
    var ns = 'http://www.w3.org/2000/svg';
    for (var i = 0; i < lines.length; i++) {
      var tspan = document.createElementNS(ns, 'tspan');
      tspan.setAttribute('x', '46');
      tspan.setAttribute('y', String(FIRST_Y + i * size));
      tspan.textContent = lines[i];
      el.appendChild(tspan);
    }
  }

  function updateSVG(rawText) {
    var lines = rawText.split('\n');
    var size  = calcFontSize(lines);

    updateTextEl(textEl, lines, size);
    updateTextEl(textElFs, lines, size);

    sizePill.textContent = size + 'px';
    if (size < DEFAULT_SIZE) {
      sizePill.classList.add('shrunk');
    } else {
      sizePill.classList.remove('shrunk');
    }
  }

  /* ── localStorage ───────────────────────────────────────────────────── */
  var saveTimer = null;
  function schedSave(val) {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(function () {
      try { localStorage.setItem(STORAGE_KEY, val); } catch (e) {}
    }, 250);
  }

  /* ── Brand switching ────────────────────────────────────────────────── */
  function switchBrand(brand) {
    currentBrand = brand;
    if (brand === 'formstack') {
      svgEl.style.display        = 'none';
      svgFormstack.style.display = 'block';
    } else {
      svgEl.style.display        = 'block';
      svgFormstack.style.display = 'none';
    }
    updateSVG(textarea.value);
  }

  brandSelect.addEventListener('change', function () {
    switchBrand(brandSelect.value);
  });

  /* ── Tabs ───────────────────────────────────────────────────────────── */
  var previewOuter    = document.getElementById('preview-outer');
  var blogPlaceholder = document.getElementById('blog-placeholder');

  tabProductboard.addEventListener('click', function () {
    tabProductboard.classList.add('active');
    tabBlog.classList.remove('active');
    previewOuter.style.display    = '';
    blogPlaceholder.style.display = 'none';
  });

  tabBlog.addEventListener('click', function () {
    tabBlog.classList.add('active');
    tabProductboard.classList.remove('active');
    previewOuter.style.display    = 'none';
    blogPlaceholder.style.display = 'block';
  });

  /* ── Handlers ───────────────────────────────────────────────────────── */
  textarea.addEventListener('input', function () {
    updateSVG(textarea.value);
    schedSave(textarea.value);
  });

  resetBtn.addEventListener('click', function () {
    textarea.value = DEFAULT_TITLE;
    updateSVG(DEFAULT_TITLE);
    try { localStorage.removeItem(STORAGE_KEY); } catch (e) {}
  });

  /* ── Export ─────────────────────────────────────────────────────────── */
  function slugify(str) {
    return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 60);
  }

  function fontFaceBlock() {
    if (currentBrand === 'formstack') {
      var sofSrc = 'url(data:font/otf;base64,' + SOFIA_B64 + ') format(\'opentype\')';
      return '@font-face { font-family: \'Sofia Pro\'; src: ' + sofSrc + '; font-weight: 400; font-style: normal; }';
    }
    var src = 'url(data:font/woff2;base64,' + FONT_B64 + ') format(\'woff2\')';
    return (
      '@font-face { font-family: \'Aeonik VF\'; src: ' + src + '; font-weight: 100 900; font-style: normal; }' +
      '@font-face { font-family: \'Aeonik\';    src: ' + src + '; font-weight: 100 900; font-style: normal; }'
    );
  }

  downloadBtn.addEventListener('click', function () {
    downloadBtn.disabled     = true;
    downloadLabel.textContent = 'Exporting…';

    var lines    = textarea.value.split('\n');
    var date     = new Date().toISOString().slice(0, 10);
    var filename = 'productboard-thumbnail-' + slugify(lines[0] || 'thumbnail') + '-' + date + '.png';

    var activeSvg  = (currentBrand === 'formstack') ? svgFormstack : svgEl;
    var serializer = new XMLSerializer();
    var svgStr     = serializer.serializeToString(activeSvg);

    if (svgStr.indexOf('xmlns=') === -1) {
      svgStr = svgStr.replace('<svg', '<svg xmlns="http://www.w3.org/2000/svg"');
    }

    var fontDefs = '<defs><style type="text/css">' + fontFaceBlock() + '</style></defs>';
    svgStr = svgStr.replace(/<\/svg>\s*$/, fontDefs + '</svg>');

    var blob = new Blob([svgStr], { type: 'image/svg+xml;charset=utf-8' });
    var url  = URL.createObjectURL(blob);
    var img  = new Image();

    img.onload = function () {
      var canvas    = document.createElement('canvas');
      canvas.width  = 1600;
      canvas.height = 697;
      canvas.getContext('2d').drawImage(img, 0, 0, 1600, 697);
      URL.revokeObjectURL(url);

      canvas.toBlob(function (pngBlob) {
        var a      = document.createElement('a');
        a.href     = URL.createObjectURL(pngBlob);
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(function () { URL.revokeObjectURL(a.href); }, 1000);

        downloadBtn.disabled      = false;
        downloadLabel.textContent = 'Download thumbnail';
      }, 'image/png');
    };

    img.onerror = function () {
      URL.revokeObjectURL(url);
      downloadBtn.disabled      = false;
      downloadLabel.textContent = 'Download thumbnail';
      alert('Export failed — see browser console for details.');
    };

    img.src = url;
  });

  /* ── Init ───────────────────────────────────────────────────────────── */
  // Force-load Sofia Pro immediately so it's ready when switching to Formstack brand,
  // even though the Formstack SVG starts hidden (browsers skip loading fonts for display:none elements).
  document.fonts.load('400 16px "Sofia Pro"');
  document.fonts.load('400 16px "Aeonik Mono"');

  document.fonts.ready.then(function () {
    var saved = null;
    try { saved = localStorage.getItem(STORAGE_KEY); } catch (e) {}
    var initial = (saved !== null) ? saved : DEFAULT_TITLE;
    textarea.value = initial;
    updateSVG(initial);
  });

}());
