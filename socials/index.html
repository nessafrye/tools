/* ── Reset ────────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; overflow: hidden; }
body {
  display: flex;
  font-family: 'Aeonik VF', 'Aeonik', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text-primary);
}

/* ── Sidebar ──────────────────────────────────────────────────────────── */
#sidebar {
  width: 260px;
  min-width: 260px;
  height: 100vh;
  background: var(--panel-bg);
  display: flex;
  flex-direction: column;
  overflow-y: auto;
  padding: 0 0 24px 0;
  border-right: 1px solid var(--border);
  scrollbar-width: thin;
  scrollbar-color: rgba(255,255,255,0.1) transparent;
}

/* Logo bar */
.sidebar-logo {
  display: flex;
  align-items: center;
  padding: 14px 16px;
  border-bottom: 1px solid var(--border);
  gap: 8px;
  flex-shrink: 0;
}
.back-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  cursor: default;
  padding: 4px;
  border-radius: 6px;
  display: flex;
  align-items: center;
  flex-shrink: 0;
  opacity: 0.5;
}
.sidebar-logo svg {
  height: 18px;
  width: auto;
}
.sidebar-logo-divider {
  width: 1px;
  height: 16px;
  background: rgba(255,255,255,0.15);
  flex-shrink: 0;
}
.sidebar-page-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  letter-spacing: -0.01em;
  white-space: nowrap;
}

/* Form sections */
.section {
  padding: 18px 20px 0;
}
.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--text-secondary);
  margin-bottom: 8px;
}

/* Inputs */
input[type=text], input[type=date], input[type=time], textarea {
  width: 100%;
  background: rgba(255,255,255,0.06);
  border: 1.5px solid var(--border);
  border-radius: 8px;
  color: var(--text-primary);
  font-family: 'Aeonik VF', sans-serif;
  font-size: 13px;
  padding: 9px 12px;
  outline: none;
  transition: border-color 0.15s;
  resize: none;
}
input[type=text]:focus, input[type=date]:focus, input[type=time]:focus, textarea:focus {
  border-color: rgba(255,152,46,0.5);
  background: rgba(255,255,255,0.09);
}
input[type=date]::-webkit-calendar-picker-indicator,
input[type=time]::-webkit-calendar-picker-indicator {
  filter: invert(0.5);
  cursor: pointer;
}
textarea { min-height: 72px; line-height: 1.4; }

.input-row {
  display: flex;
  flex-direction: column;
  gap: 6px;
  margin-top: 4px;
}
.input-row > * { width: 100%; }

/* Color swatches */
.swatch-grid {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-top: 4px;
}
.swatch {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  cursor: pointer;
  border: 2px solid transparent;
  transition: transform 0.12s, border-color 0.12s;
  position: relative;
}
.swatch:hover { transform: scale(1.1); }
.swatch.active {
  border-color: white;
  transform: scale(1.12);
}

/* Speakers */
.speakers-list {
  display: flex;
  flex-direction: column;
  gap: 10px;
  margin-top: 4px;
}
.speaker-card {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid var(--border);
  border-radius: 10px;
  padding: 12px;
  position: relative;
}
.speaker-card input {
  margin-bottom: 6px;
  background: rgba(255,255,255,0.06);
}
.speaker-card input:last-of-type { margin-bottom: 0; }
.speaker-remove {
  position: absolute;
  top: 8px;

<script>
// ── Asset definitions per tab ─────────────────────────────────────────
const ASSET_SETS = {
  webinar: [
    { id: 'linkedin-post',    label: 'LinkedIn Post',         w: 1080, h: 1350 },
    { id: 'linkedin-event',   label: 'LinkedIn Event Banner',  w: 1128, h: 191 },
    { id: 'twitter-post',     label: 'X / Twitter Post',       w: 1600, h: 900 },
    { id: 'email-header',     label: 'Email Header',           w: 600,  h: 200 },
    { id: 'og-image',         label: 'OG / Website Image',     w: 1200, h: 630 },
  ],
  linkedin: [
    { id: 'linkedin-post',    label: 'LinkedIn Post',          w: 1080, h: 1350 },
    { id: 'linkedin-story',   label: 'LinkedIn Story',         w: 1080, h: 1920 },
  ],
  email: [
    { id: 'email-header',     label: 'Email Header',           w: 600,  h: 200 },
    { id: 'email-banner',     label: 'Email Banner',           w: 600,  h: 300 },
  ],
  website: [
    { id: 'og-image',         label: 'OG / Website Image',     w: 1200, h: 630 },
    { id: 'hero-banner',      label: 'Hero Banner',            w: 1440, h: 500 },
  ],
};

// ── State ─────────────────────────────────────────────────────────────
var state = {
  accentColor: '#000000',
  accentDark:  '#464646',
  title:       '',
  date:        '',
  time:        '',
  isLive:      false,
  partnerLogo: null,
  speakers:    [],
  activeTab:   'webinar',
};

// ── Speakers ──────────────────────────────────────────────────────────
var speakerIdCounter = 0;
function addSpeaker() {
  var id = ++speakerIdCounter;
  state.speakers.push({ id, name: '', role: '', company: '', photo: null });
  renderSpeakers();
  renderAllCanvases();
}

function removeSpeaker(id) {
  state.speakers = state.speakers.filter(s => s.id !== id);
  renderSpeakers();
  renderAllCanvases();
}

function renderSpeakers() {
  var list = document.getElementById('speakers-list');
  list.innerHTML = '';
  state.speakers.forEach(function(s) {
    var card = document.createElement('div');
    card.className = 'speaker-card';
    card.innerHTML = `
      <button class="speaker-remove" onclick="removeSpeaker(${s.id})" title="Remove">✕</button>
      <div class="speaker-photo-row">
        <div class="speaker-avatar" id="avatar-${s.id}" onclick="triggerPhotoUpload(${s.id})">
          ${s.photo ? `<img src="${s.photo}" alt="headshot">` : '+'}
          <input type="file" accept="image/*" id="file-${s.id}" onchange="handlePhoto(${s.id}, this)">
        </div>
        <input type="text" placeholder="Full name" value="${s.name}"
          oninput="updateSpeaker(${s.id}, 'name', this.value)" style="flex:1;margin:0">
      </div>
      <input type="text" placeholder="Title / Role" value="${s.role}"
        oninput="updateSpeaker(${s.id}, 'role', this.value)">
      <input type="text" placeholder="Company" value="${s.company}"
        oninput="updateSpeaker(${s.id}, 'company', this.value)" style="margin-bottom:0">
    `;
    list.appendChild(card);
  });
}

function triggerPhotoUpload(id) {
  document.getElementById('file-' + id).click();
}

function handlePhoto(id, input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    var s = state.speakers.find(function(s) { return s.id === id; });
    if (s) {
      s.photo = e.target.result;
      renderSpeakers();
      renderAllCanvases();
    }
  };
  reader.readAsDataURL(file);
}

function updateSpeaker(id, field, value) {
  var s = state.speakers.find(function(s) { return s.id === id; });
  if (s) {
    s[field] = value;
    renderAllCanvases();
  }
}

// ── Tabs ──────────────────────────────────────────────────────────────
document.querySelectorAll('.tab').forEach(function(tab) {
  tab.addEventListener('click', function() {
    document.querySelectorAll('.tab').forEach(function(t) { t.classList.remove('active'); });
    tab.classList.add('active');
    state.activeTab = tab.dataset.tab;
    buildAssetGrid();
  });
});

// ── Asset grid ────────────────────────────────────────────────────────
function buildAssetGrid() {
  var grid = document.getElementById('assets-grid');
  grid.innerHTML = '';
  var assets = ASSET_SETS[state.activeTab] || [];
  assets.forEach(function(asset) {
    var card = document.createElement('div');
    card.className = 'asset-card';
    // Scale canvas display width to card width; keep aspect ratio
    var displayScale = 316 / asset.w; // ~316px internal width target
    var dispW = 316;
    var dispH = Math.round(asset.h * displayScale);
    card.innerHTML = `
      <div class="asset-card-header">
        <span class="asset-name">${asset.label}</span>
        <span class="asset-dims">${asset.w} × ${asset.h} px</span>
      </div>
      <div class="asset-canvas-wrap">
        <canvas id="canvas-${asset.id}" width="${asset.w}" height="${asset.h}"
          style=""></canvas>
      </div>
      <div class="asset-card-footer">
        <button class="btn-download" onclick="downloadAsset('${asset.id}', '${asset.label}')">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 1v7M3.5 5.5L6 8l2.5-2.5M1.5 10h9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Download PNG
        </button>
      </div>
    `;
    grid.appendChild(card);
  });
  renderAllCanvases();
}

// ── Canvas rendering ──────────────────────────────────────────────────
var photoCache = {};

function loadImage(src) {
  return new Promise(function(resolve) {
    if (photoCache[src]) { resolve(photoCache[src]); return; }
    var img = new Image();
    img.onload = function() { photoCache[src] = img; resolve(img); };
    img.onerror = function() { resolve(null); };
    img.src = src;
  });
}

function renderAllCanvases() {
  var assets = ASSET_SETS[state.activeTab] || [];
  assets.forEach(function(asset) {
    renderCanvas(asset);
  });
}

function renderCanvas(asset) {
  var canvas = document.getElementById('canvas-' + asset.id);
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W = asset.w, H = asset.h;

  // Load all speaker photos first
  var photoPromises = state.speakers.map(function(s) {
    return s.photo ? loadImage(s.photo) : Promise.resolve(null);
  });

  Promise.all(photoPromises).then(function(photos) {
    drawAsset(ctx, W, H, asset, photos);
  });
}

function drawAsset(ctx, W, H, asset, photos) {
  // Route linkedin-post to its bespoke renderer
  if (asset.id === 'linkedin-post') {
    drawLinkedInPost(ctx, W, H, photos);
    return;
  }

  var accent = state.accentColor || '#FF982E';
  var isDark = isDarkColor(accent);
  var textColor = isDark ? '#ffffff' : '#1a1a1a';
  var bgColor = '#1a1a1a';

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  var bandW = Math.round(W * 0.006);
  ctx.fillStyle = accent;
  ctx.fillRect(0, 0, bandW, H);

  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  ctx.lineWidth = 1;
  var step = Math.round(W / 24);
  for (var x = 0; x < W; x += step) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (var y = 0; y < H; y += step) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  var pad = Math.round(W * 0.05);
  var isWide = W / H > 2;
  var isTall = H / W > 1;

  if (isTall) {
    drawTallLayout(ctx, W, H, pad, accent, textColor, photos);
  } else if (isWide) {
    drawWideLayout(ctx, W, H, pad, accent, textColor, photos);
  } else {
    drawStandardLayout(ctx, W, H, pad, accent, textColor, photos);
  }
}

// ── LinkedIn Post bespoke renderer (1080×1350) ───────────────────────────
var partnerLogoCache = null;

function wrapTextCount(ctx, text, maxWidth, maxLines) {
  var words = text.split(' ');
  var line = '', count = 0;
  for (var n = 0; n < words.length; n++) {
    var test = line + (line ? ' ' : '') + words[n];
    if (ctx.measureText(test).width > maxWidth && line) {
      count++;
      if (count >= maxLines) return maxLines;
      line = words[n];
    } else { line = test; }
  }
  return count + 1;
}

// Draws wrapped text, returns the baseline Y of the last line drawn
function wrapTextLines(ctx, text, x, y, maxWidth, lineHeight) {
  var words = text.split(' ');
  var line = '';
  var curY = y;
  for (var n = 0; n < words.length; n++) {
    var test = line + (line ? ' ' : '') + words[n];
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, curY);
      line = words[n];
      curY += lineHeight;
    } else { line = test; }
  }
  if (line) ctx.fillText(line, x, curY);
  return curY;
}

function drawLinkedInPost(ctx, W, H, photos) {
  // All coordinates calibrated to 1080×1350

  // ── Background
  ctx.fillStyle = '#000000';
  ctx.fillRect(0, 0, W, H);

  // ── Partner logo (top-right)
  if (state.partnerLogo && partnerLogoCache) {
    var maxH = 48, maxW = 220;
    var ratio = partnerLogoCache.width / partnerLogoCache.height;
    var pW = Math.min(maxW, maxH * ratio);
    var pH = pW / ratio;
    ctx.drawImage(partnerLogoCache, W - 50 - pW, 33, pW, pH);
  }

  // ── Main title — cap top y≈50, baseline y≈117 (92px × 0.73 cap ratio)
  var titleSize = 92;
  var titleLH   = Math.round(titleSize * 1.1);
  var titleBase = 117;
  var titleMaxW = W - 100;
  ctx.fillStyle = '#ffffff';
  ctx.font = 'bold ' + titleSize + 'px Aeonik VF, Aeonik, sans-serif';
  ctx.textAlign = 'left';
  var lineCount = wrapTextCount(ctx, state.title || 'Webinar Title', titleMaxW, 3);
  wrapText(ctx, state.title || 'Webinar Title', 50, titleBase, titleMaxW, titleLH, 3);
  var lastTitleBase = titleBase + (lineCount - 1) * titleLH;

  // ── Date bar — min y=240, or below last title line
  var dateTop = Math.max(240, lastTitleBase + 44);

  // LIVE indicator
  if (state.isLive) {
    var dotCY = dateTop + 26;
    ctx.beginPath();
    ctx.arc(69, dotCY, 7, 0, Math.PI * 2);
    ctx.fillStyle = '#EB5639';
    ctx.fill();
    ctx.fillStyle = '#ffffff';
    ctx.font = '600 20px Aeonik Mono, Aeonik VF, monospace';
    ctx.textAlign = 'left';
    ctx.fillText('LIVE', 94, dateTop + 34);
  }

  // Date pill — hugs content, format: "MONTH DAY  →  H:MM AM"
  var pillFont = '400 22px Aeonik VF, Aeonik, sans-serif';
  ctx.font = pillFont;
  var dateStr, timeStr;
  if (state.date) {
    var d = new Date(state.date + 'T12:00:00');
    dateStr = d.toLocaleDateString('en-US', { month: 'long', day: 'numeric' }).toUpperCase();
  } else {
    dateStr = 'DATE';
  }
  timeStr = state.time ? formatTime12(state.time) : 'TIME';
  var pillText  = dateStr + '   →   ' + timeStr;
  var pillPad   = 16;
  var pillTextW = ctx.measureText(pillText).width;
  var pillW     = Math.round(pillTextW + pillPad * 2);
  var pillH     = 53;
  var pillX     = state.isLive ? 181 : 50;
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(pillX, dateTop, pillW, pillH);
  ctx.fillStyle = '#000000';
  ctx.font = pillFont;
  ctx.textAlign = 'left';
  ctx.fillText(pillText, pillX + pillPad, dateTop + 34);

  // ── Speakers — squares at (50,916) and (545,916), 250×250
  var speakerXs = [50, 545];
  var textXs    = [316, 811];
  var speakerY  = 916;
  var avatarSz  = 250;

  state.speakers.slice(0, 2).forEach(function(speaker, i) {
    var sx = speakerXs[i];
    var tx = textXs[i];
    var photo = photos[i];
    var textMaxW = (i === 0 ? speakerXs[1] : W - 50) - tx - 10;

    // Square headshot
    if (photo) {
      ctx.drawImage(photo, sx, speakerY, avatarSz, avatarSz);
    } else {
      ctx.fillStyle = 'rgba(255,255,255,0.10)';
      ctx.fillRect(sx, speakerY, avatarSz, avatarSz);
      var initials = (speaker.name || '?').split(' ').map(function(w) { return w[0] || ''; }).join('').slice(0, 2).toUpperCase();
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.font = 'bold 80px Aeonik VF, Aeonik, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText(initials, sx + avatarSz / 2, speakerY + avatarSz * 0.62);
      ctx.textAlign = 'left';
    }

    // Name — wrapping, ~32px bold, starting at y=1107
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 32px Aeonik VF, Aeonik, sans-serif';
    ctx.textAlign = 'left';
    var nameLastY = wrapTextLines(ctx, speaker.name || 'Speaker Name', tx, 1107, textMaxW, 38);

    // Role — wrapping, 23px
    if (speaker.role) {
      ctx.fillStyle = 'rgba(255,255,255,0.65)';
      ctx.font = '400 23px Aeonik VF, Aeonik, sans-serif';
      var roleLastY = wrapTextLines(ctx, speaker.role, tx, nameLastY + 34, textMaxW, 28);
    }

    // Company — wrapping, 18px
    if (speaker.company) {
      var companyY = (speaker.role ? (nameLastY + 34 + 28) : nameLastY + 34);
      ctx.fillStyle = 'rgba(255,255,255,0.40)';
      ctx.font = '400 18px Aeonik VF, Aeonik, sans-serif';
      wrapTextLines(ctx, speaker.company, tx, companyY + 28, textMaxW, 22);
    }
  });

  // ── Register Today button — 32px bold, 30px padding all sides
  ctx.font = 'bold 32px Aeonik VF, Aeonik, sans-serif';
  var btnText = 'Register Today →';
  var btnPad  = 30;
  var btnW    = Math.round(ctx.measureText(btnText).width + btnPad * 2);
  var btnH    = 32 + btnPad * 2;  // text cap + padding
  var btnX    = W - 50 - btnW;
  var btnY    = 1222;
  ctx.fillStyle = '#F181FF';
  ctx.fillRect(btnX, btnY, btnW, btnH);
  ctx.fillStyle = '#ffffff';
  ctx.textAlign = 'center';
  ctx.fillText(btnText, btnX + btnW / 2, btnY + btnH / 2 + 12);
  ctx.textAlign = 'left';

  // ── Intellistack icon (white, exact SVG positions)
  var iconRects = [
    [58.93, 1255.41, 8.89, 4.44],
    [58.93, 1264.28, 8.89, 4.44],
    [58.93, 1273.16, 8.89, 4.43],
    [67.82, 1259.85, 8.89, 4.43],
    [67.82, 1268.72, 8.89, 4.44],
    [76.71, 1264.28, 8.89, 4.44],
  ];
  ctx.fillStyle = '#ffffff';
  iconRects.forEach(function(r) { ctx.fillRect(r[0], r[1], r[2], r[3]); });

  // Intellistack wordmark
  ctx.fillStyle = '#ffffff';
  ctx.font = '500 22px Aeonik VF, Aeonik, sans-serif';
  ctx.textAlign = 'left';
  ctx.fillText('Intellistack', 94, 1278);
}

// ── Helpers ───────────────────────────────────────────────────────────
function wrapText(ctx, text, x, y, maxWidth, lineHeight, maxLines) {
  var words = text.split(' ');
  var line = '';
  var lineCount = 0;
  for (var i = 0; i < words.length; i++) {
    var testLine = line + (line ? ' ' : '') + words[i];
    var metrics = ctx.measureText(testLine);
    if (metrics.width > maxWidth && line) {
      ctx.fillText(line, x, y + lineCount * lineHeight);
      line = words[i];
      lineCount++;
      if (lineCount >= maxLines) {
        // Truncate with ellipsis
        var ellLine = line;
        while (ctx.measureText(ellLine + '…').width > maxWidth && ellLine.length > 0) {
          ellLine = ellLine.slice(0, -1);
        }
        ctx.fillText(ellLine + '…', x, y + lineCount * lineHeight);
        return;
      }
    } else {
      line = testLine;
    }
  }
  ctx.fillText(line, x, y + lineCount * lineHeight);
}

function formatDate(d) {
  if (!d) return '';
  var parts = d.split('-');
  if (parts.length !== 3) return d;
  var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return months[parseInt(parts[1]) - 1] + ' ' + parseInt(parts[2]) + ', ' + parts[0];
}

function formatTime12(t) {
  if (!t) return '';
  var parts = t.split(':');
  var h = parseInt(parts[0]);
  var m = parts[1];
  var ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return h + ':' + m + ' ' + ampm;
}

function isDarkColor(hex) {
  var c = hex.replace('#','');
  if (c.length === 3) c = c[0]+c[0]+c[1]+c[1]+c[2]+c[2];
  var r = parseInt(c.substr(0,2),16), g = parseInt(c.substr(2,2),16), b = parseInt(c.substr(4,2),16);
  return (r * 299 + g * 587 + b * 114) / 1000 < 128;
}

// ── Download ──────────────────────────────────────────────────────────
function downloadAsset(id, label) {
  var canvas = document.getElementById('canvas-' + id);
  if (!canvas) return;
  var a = document.createElement('a');
  a.download = label.replace(/[^a-z0-9]/gi,'_').toLowerCase() + '.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
}

document.getElementById('btn-download-all').addEventListener('click', function() {
  var assets = ASSET_SETS[state.activeTab] || [];
  assets.forEach(function(asset, i) {
    setTimeout(function() { downloadAsset(asset.id, asset.label); }, i * 200);
  });
});

// ── Inputs ────────────────────────────────────────────────────────────
document.getElementById('input-title').addEventListener('input', function() {
  state.title = this.value; renderAllCanvases();
});

document.getElementById('toggle-live').addEventListener('change', function() {
  state.isLive = this.checked; renderAllCanvases();
});

// Partner logo
function triggerPartnerUpload() {
  document.getElementById('file-partner').click();
}
function handlePartnerLogo(input) {
  var file = input.files[0];
  if (!file) return;
  var reader = new FileReader();
  reader.onload = function(e) {
    state.partnerLogo = e.target.result;
    var img2 = new Image(); img2.onload = function(){ partnerLogoCache = img2; renderAllCanvases(); }; img2.src = e.target.result;
    var target = document.getElementById('partner-logo-target');
    var placeholder = document.getElementById('partner-logo-placeholder');
    var clearBtn = document.getElementById('partner-logo-clear');
    // Show image preview inside the target
    placeholder.innerHTML = '<img src="' + e.target.result + '" alt="Partner logo" style="max-height:36px;max-width:160px;object-fit:contain">';
    clearBtn.classList.add('visible');
    // renderAllCanvases called above when img loads
  };
  reader.readAsDataURL(file);
}
function clearPartnerLogo() {
  state.partnerLogo = null;
  partnerLogoCache = null;
  document.getElementById('partner-logo-placeholder').innerHTML = '<div>Click to upload</div><div style="font-size:10px;margin-top:2px;opacity:0.6">PNG, SVG or JPG</div>';
  document.getElementById('partner-logo-clear').classList.remove('visible');
  document.getElementById('file-partner').value = '';
  renderAllCanvases();
}
document.getElementById('input-date').addEventListener('change', function() {
  state.date = this.value; renderAllCanvases();
});
document.getElementById('input-time').addEventListener('change', function() {
  state.time = this.value; renderAllCanvases();
});

// ── Swatches ──────────────────────────────────────────────────────────
document.querySelectorAll('.swatch').forEach(function(sw) {
  sw.addEventListener('click', function() {
    document.querySelectorAll('.swatch').forEach(function(s) { s.classList.remove('active'); });
    sw.classList.add('active');
    state.accentColor = sw.dataset.color;
    state.accentDark  = sw.dataset.dark;
    document.documentElement.style.setProperty('--accent', state.accentColor);
    document.documentElement.style.setProperty('--accent-dark', state.accentDark);
    renderAllCanvases();
  });
});

// ── Speaker button ────────────────────────────────────────────────────
document.getElementById('btn-add-speaker').addEventListener('click', addSpeaker);

// ── Reset ─────────────────────────────────────────────────────────────
document.getElementById('btn-reset').addEventListener('click', function() {
  if (!confirm('Reset all fields to defaults?')) return;
  state.title = ''; state.date = ''; state.time = '';
  state.isLive = false; state.partnerLogo = null; state.speakers = [];
  document.getElementById('input-title').value = '';
  document.getElementById('input-date').value = '';
  document.getElementById('input-time').value = '';
  document.getElementById('toggle-live').checked = false;
  clearPartnerLogo();
  document.querySelectorAll('.swatch').forEach(function(s) { s.classList.remove('active'); });
  document.querySelectorAll('.swatch')[0].classList.add('active');
  state.accentColor = '#000000'; state.accentDark = '#464646';
  document.documentElement.style.setProperty('--accent', '#000000');
  document.documentElement.style.setProperty('--accent-dark', '#464646');
  renderSpeakers();
  renderAllCanvases();
});

buildAssetGrid();
